<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flappy Kiro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #nicknameOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 10;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    #nicknameOverlay.active { display: flex; }
    #nicknameOverlay h1 { color: #fff; font: bold 2.5rem monospace; }
    #nicknameOverlay p  { color: #fff; font: 1.2rem monospace; }
    #nicknameOverlay input {
      font: 1.4rem monospace;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      width: min(320px, 80vw);
      text-align: center;
      outline: none;
    }
    #nicknameOverlay button {
      font: bold 1.1rem monospace;
      padding: 10px 32px;
      background: #4CAF50;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #nicknameOverlay button:active { background: #388E3C; }
    #nicknameError { color: #ff4444; font: 0.95rem monospace; min-height: 1.2em; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>
  <!-- Google Analytics 4 (direct gtag — works independently of Firebase init) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=%%FIREBASE_MEASUREMENT_ID%%"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', '%%FIREBASE_MEASUREMENT_ID%%');
  </script>
  <script>
    // Firebase config injected at deploy time by GitHub Actions.
    // See .github/workflows/deploy.yml — values come from repository secrets.
    const firebaseConfig = {
      apiKey: "%%FIREBASE_API_KEY%%",
      authDomain: "%%FIREBASE_AUTH_DOMAIN%%",
      projectId: "%%FIREBASE_PROJECT_ID%%",
      storageBucket: "%%FIREBASE_STORAGE_BUCKET%%",
      messagingSenderId: "%%FIREBASE_MESSAGING_SENDER_ID%%",
      appId: "%%FIREBASE_APP_ID%%",
      measurementId: "%%FIREBASE_MEASUREMENT_ID%%",
    };
  </script>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="nicknameOverlay">
    <h1>Flappy Kiro</h1>
    <p>Enter your nickname</p>
    <input type="text" id="nicknameInput" autocomplete="off" maxlength="20" placeholder="Your name..." />
    <div id="nicknameError"></div>
    <button id="nicknameConfirm">Play</button>
  </div>

  <script>
    // ─── Scaled Constants ────────────────────────────────────────────────────
    function getScaledConstants(canvas) {
      const scale = canvas.height / 600; // 600px is the reference height
      return {
        gravity: 0.5 * scale,
        flapVelocity: -9 * scale,
        scrollSpeed: 3 * scale,
        gapSize: 180 * scale,
        pipeInterval: 220 * scale,
        pipeWidth: 60 * scale,
        ghostyWidth: 48 * scale,
        ghostyHeight: 48 * scale,
        scoreBarHeight: 48 * scale,
      };
    }

    // ─── Physics Engine ──────────────────────────────────────────────────────
    const PhysicsEngine = {
      GRAVITY: 0.5,
      FLAP_VELOCITY: -9,
      applyGravity(ghosty) {
        ghosty.vy += this.GRAVITY;
        ghosty.y += ghosty.vy;
      },
      applyFlap(ghosty) {
        ghosty.vy = this.FLAP_VELOCITY;
      },
      clampToBounds(ghosty, canvasHeight, scoreBarHeight) {
        if (ghosty.y <= 0) {
          ghosty.y = 0;
          ghosty.vy = 0;
          return { gameOver: false };
        }
        if (ghosty.y >= canvasHeight - scoreBarHeight) {
          return { gameOver: true };
        }
        return { gameOver: false };
      },
    };

    // ─── Obstacle Manager ────────────────────────────────────────────────────
    const ObstacleManager = {
      PIPE_INTERVAL: 220,
      SCROLL_SPEED: 3,
      GAP_SIZE: 180,
      pipes: [],
      clouds: [],

      spawnPipe(gameState) {
        const { canvas, scoreBarHeight } = gameState;
        const { gapSize, pipeWidth, scrollSpeed } = getScaledConstants(canvas);
        const minMargin = 60 * (canvas.height / 600);
        const maxGapTop = canvas.height - scoreBarHeight - gapSize - minMargin;
        const gapTop = minMargin + Math.random() * (maxGapTop - minMargin);
        const gapBottom = gapTop + gapSize;
        const pipe = {
          x: canvas.width + pipeWidth,
          gapTop,
          gapBottom,
          width: pipeWidth,
          scored: false,
        };
        this.pipes.push(pipe);
        return pipe;
      },

      spawnCloud(gameState) {
        const { canvas, scoreBarHeight } = gameState;
        const scale = canvas.height / 600;
        const cloudWidth = 80 * scale;
        const cloudHeight = 30 * scale;
        const minY = 20;
        const maxY = canvas.height - scoreBarHeight - 40 - cloudHeight;
        const y = minY + Math.random() * (maxY - minY);
        const cloud = {
          x: canvas.width,
          y,
          width: cloudWidth,
          height: cloudHeight,
        };
        this.clouds.push(cloud);
        return cloud;
      },

      update(gameState) {
        const { canvas, scoreBarHeight } = gameState;
        const { scrollSpeed, pipeWidth } = getScaledConstants(canvas);

        // Move all pipes and clouds leftward
        for (const pipe of this.pipes) pipe.x -= scrollSpeed;
        for (const cloud of this.clouds) cloud.x -= scrollSpeed;

        // Remove off-screen obstacles
        this.pipes = this.pipes.filter(p => p.x + p.width > 0);
        this.clouds = this.clouds.filter(c => c.x + c.width > 0);

        // Spawn new pipe when it's time
        const pipeInterval = getScaledConstants(canvas).pipeInterval;
        if (gameState.nextPipeX !== undefined) {
          if (canvas.width >= gameState.nextPipeX) {
            // use nextPipeX tracking
          }
        }
        // Spawn based on last pipe position
        const lastPipe = this.pipes[this.pipes.length - 1];
        if (!lastPipe || lastPipe.x <= canvas.width - pipeInterval) {
          this.spawnPipe(gameState);
          // Occasionally spawn a cloud
          if (Math.random() < 0.4) this.spawnCloud(gameState);
        }
      },

      reset() {
        this.pipes = [];
        this.clouds = [];
      },
    };

    // ─── Score Manager ───────────────────────────────────────────────────────
    const ScoreManager = {
      score: 0,
      highScore: 0,
      loadHighScore() {
        try {
          this.highScore = parseInt(localStorage.getItem('flappyKiroHighScore')) || 0;
        } catch {
          this.highScore = 0;
        }
      },
      saveHighScore() {
        try {
          localStorage.setItem('flappyKiroHighScore', this.highScore);
        } catch { /* in-memory only */ }
      },
      checkPipeCrossing(ghosty, pipes) {
        for (const pipe of pipes) {
          if (!pipe.scored && ghosty.x > pipe.x + pipe.width) {
            pipe.scored = true;
            this.incrementScore();
          }
        }
      },
      incrementScore() {
        this.score++;
        if (this.score > this.highScore) {
          this.highScore = this.score;
          this.saveHighScore();
        }
      },
      reset() {
        this.score = 0;
      },
    };

    // ─── Nickname Manager ────────────────────────────────────────────────────
    const NicknameManager = {
      STORAGE_KEY: 'flappyKiroNickname',
      MAX_LENGTH: 20,

      validate(raw) {
        const trimmed = raw.trim();
        if (trimmed.length === 0) return { valid: false, error: 'Nickname cannot be empty' };
        if (trimmed.length > this.MAX_LENGTH) return { valid: false, error: 'Max 20 characters' };
        return { valid: true, error: null };
      },

      getNickname() {
        try {
          return localStorage.getItem(this.STORAGE_KEY);
        } catch {
          return null;
        }
      },

      saveNickname(raw) {
        const trimmed = raw.trim();
        const { valid } = this.validate(trimmed);
        if (!valid) return false;
        try {
          localStorage.setItem(this.STORAGE_KEY, trimmed);
        } catch { /* silent no-op */ }
        return true;
      },

      hasNickname() {
        const nickname = this.getNickname();
        return nickname !== null && nickname.length > 0;
      },
    };

    // ─── Leaderboard Manager ─────────────────────────────────────────────────
    const LeaderboardManager = {
      db: null,
      lastEntries: [],
      isLoading: false,
      loadError: false,

      init() {
        try {
          if (typeof window.firebase === 'undefined' || typeof firebaseConfig === 'undefined') return;
          firebase.initializeApp(firebaseConfig);
          this.db = firebase.firestore();
          // Initialize Analytics if measurementId is present and injected
          if (firebaseConfig.measurementId && !firebaseConfig.measurementId.startsWith('%%')) {
            firebase.analytics();
          }
        } catch (e) {
          console.warn('LeaderboardManager.init() failed:', e);
        }
      },

      submitScore(nickname, score) {
        if (score === 0 || this.db === null) return Promise.resolve();
        return new Promise((resolve) => {
          this.db.collection('scores').add({ nickname, score, timestamp: Date.now() })
            .then(() => resolve())
            .catch((e) => {
              console.warn('LeaderboardManager.submitScore() failed:', e);
              resolve();
            });
        });
      },

      fetchTopScores() {
        if (this.db === null) return Promise.resolve([]);
        this.isLoading = true;
        this.loadError = false;
        const query = this.db.collection('scores').orderBy('score', 'desc').limit(10).get();
        const timeout = new Promise((resolve) => setTimeout(() => resolve(null), 5000));
        return Promise.race([query, timeout])
          .then((result) => {
            if (result === null) {
              this.loadError = true;
              console.warn('LeaderboardManager.fetchTopScores() timed out');
              return [];
            }
            const entries = result.docs.map((doc) => {
              const data = doc.data();
              return { nickname: data.nickname, score: data.score, timestamp: data.timestamp };
            });
            this.lastEntries = entries;
            return entries;
          })
          .catch((e) => {
            this.loadError = true;
            console.warn('LeaderboardManager.fetchTopScores() failed:', e);
            return [];
          })
          .finally(() => {
            this.isLoading = false;
          });
      },

      submitAndFetch(nickname, score) {
        return this.submitScore(nickname, score).then(() => this.fetchTopScores());
      },
    };

    // ─── Analytics ───────────────────────────────────────────────────────────
    const Analytics = {
      log(eventName, params = {}) {
        try {
          if (typeof gtag === 'function') {
            gtag('event', eventName, params);
          }
        } catch(e) { /* silent */ }
      },
    };

    // ─── Input Handler ───────────────────────────────────────────────────────
    const InputHandler = {
      pendingFlap: false,
      bind(canvas) {
        window.addEventListener('keydown', (e) => {
          if (e.code === 'Space' || e.key === ' ') this.pendingFlap = true;
        });
        canvas.addEventListener('click', () => { this.pendingFlap = true; });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); this.pendingFlap = true; });
      },
      consumeFlap() {
        if (this.pendingFlap) {
          this.pendingFlap = false;
          return true;
        }
        return false;
      },
    };

    // ─── Audio Manager ───────────────────────────────────────────────────────
    const AudioManager = {
      jumpSound: new Audio('assets/jump.wav'),
      gameOverSound: new Audio('assets/game_over.wav'),
      unlocked: false,
      unlock() {
        this.unlocked = true;
      },
      playJump() {
        if (!this.unlocked) return;
        try {
          this.jumpSound.currentTime = 0;
          this.jumpSound.play();
        } catch(e) { /* silent */ }
      },
      playGameOver() {
        if (!this.unlocked) return;
        try {
          this.gameOverSound.currentTime = 0;
          this.gameOverSound.play();
        } catch(e) { /* silent */ }
      },
    };

    // ─── Renderer ────────────────────────────────────────────────────────────
    const Renderer = {
      ctx: null,
      ghostyImg: new Image(),
      ghostyImgFailed: false,

      drawBackground(canvas) {
        const ctx = this.ctx;
        ctx.fillStyle = '#87CEEB';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        // Sketchy texture lines
        ctx.strokeStyle = '#6ab4d8';
        ctx.lineWidth = 1;
        for (let i = 0; i < 20; i++) {
          const x = Math.floor((canvas.width / 20) * i + 10);
          const y = Math.floor(30 + (canvas.height / 20) * (i % 7));
          const len = 20 + (i * 13) % 40;
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x + len, y + 2);
          ctx.stroke();
        }
      },

      drawGhosty(ghosty) {
        const ctx = this.ctx;
        if (!this.ghostyImgFailed && this.ghostyImg.complete && this.ghostyImg.naturalWidth > 0) {
          ctx.drawImage(
            this.ghostyImg,
            ghosty.x - ghosty.width / 2,
            ghosty.y - ghosty.height / 2,
            ghosty.width,
            ghosty.height
          );
        } else {
          // Fallback: white circle with eyes
          const r = ghosty.width / 2;
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(ghosty.x, ghosty.y, r, 0, Math.PI * 2);
          ctx.fill();
          // Eyes
          ctx.fillStyle = '#222222';
          ctx.beginPath();
          ctx.arc(ghosty.x - r * 0.3, ghosty.y - r * 0.1, r * 0.15, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(ghosty.x + r * 0.3, ghosty.y - r * 0.1, r * 0.15, 0, Math.PI * 2);
          ctx.fill();
        }
      },

      drawPipes(pipes, canvas, scoreBarHeight) {
        const ctx = this.ctx;
        for (const pipe of pipes) {
          // Top pipe
          ctx.fillStyle = '#4CAF50';
          ctx.fillRect(pipe.x, 0, pipe.width, pipe.gapTop);
          ctx.strokeStyle = '#388E3C';
          ctx.lineWidth = 2;
          ctx.strokeRect(pipe.x, 0, pipe.width, pipe.gapTop);
          // Bottom pipe
          const bottomY = pipe.gapBottom;
          const bottomH = canvas.height - scoreBarHeight - bottomY;
          ctx.fillStyle = '#4CAF50';
          ctx.fillRect(pipe.x, bottomY, pipe.width, bottomH);
          ctx.strokeStyle = '#388E3C';
          ctx.lineWidth = 2;
          ctx.strokeRect(pipe.x, bottomY, pipe.width, bottomH);
        }
      },

      drawClouds(clouds) {
        const ctx = this.ctx;
        ctx.globalAlpha = 0.4;
        for (const cloud of clouds) {
          const r = cloud.height / 2;
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          if (ctx.roundRect) {
            ctx.roundRect(cloud.x, cloud.y, cloud.width, cloud.height, r);
          } else {
            // Manual rounded rect
            ctx.moveTo(cloud.x + r, cloud.y);
            ctx.lineTo(cloud.x + cloud.width - r, cloud.y);
            ctx.arc(cloud.x + cloud.width - r, cloud.y + r, r, -Math.PI / 2, 0);
            ctx.lineTo(cloud.x + cloud.width, cloud.y + cloud.height - r);
            ctx.arc(cloud.x + cloud.width - r, cloud.y + cloud.height - r, r, 0, Math.PI / 2);
            ctx.lineTo(cloud.x + r, cloud.y + cloud.height);
            ctx.arc(cloud.x + r, cloud.y + cloud.height - r, r, Math.PI / 2, Math.PI);
            ctx.lineTo(cloud.x, cloud.y + r);
            ctx.arc(cloud.x + r, cloud.y + r, r, Math.PI, -Math.PI / 2);
            ctx.closePath();
          }
          ctx.fill();
          ctx.strokeStyle = '#cccccc';
          ctx.lineWidth = 1;
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      },

      drawScoreBar(canvas, score, highScore) {
        const ctx = this.ctx;
        const scoreBarHeight = getScaledConstants(canvas).scoreBarHeight;
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, canvas.height - scoreBarHeight, canvas.width, scoreBarHeight);
        ctx.fillStyle = '#ffffff';
        ctx.font = '20px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(
          `Score: ${score} | High: ${highScore}`,
          canvas.width / 2,
          canvas.height - scoreBarHeight / 2
        );
      },

      drawIdleScreen(canvas) {
        const ctx = this.ctx;
        ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = 'bold 48px monospace';
        ctx.fillText('Flappy Kiro', canvas.width / 2, canvas.height / 2 - 40);
        ctx.font = '24px monospace';
        ctx.fillText('Tap / Click / Space to Start', canvas.width / 2, canvas.height / 2 + 20);
      },

      drawGameOverScreen(canvas, score) {
        const ctx = this.ctx;
        ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = 'bold 56px monospace';
        ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 60);
        ctx.font = '28px monospace';
        ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + 10);
        ctx.font = '22px monospace';
        ctx.fillText('Tap to Restart', canvas.width / 2, canvas.height / 2 + 60);
      },

      drawNicknameScreen(canvas, inputEl, errorMessage) {
        const ctx = this.ctx;
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        // Dark overlay
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // Title
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 48px monospace';
        ctx.fillText('Flappy Kiro', cx, cy - 100);

        // Subtitle
        ctx.font = '24px monospace';
        ctx.fillText('Enter your nickname', cx, cy - 44);

        // Input box with current typed value
        const inputValue = inputEl ? inputEl.value : '';
        const boxW = Math.min(360, canvas.width * 0.7);
        const boxH = 48;
        const boxX = cx - boxW / 2;
        const boxY = cy - boxH / 2;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(boxX, boxY, boxW, boxH);
        ctx.fillStyle = '#1a1a2e';
        ctx.font = '28px monospace';
        ctx.fillText(inputValue || '', cx, cy);

        // Error message
        if (errorMessage) {
          ctx.fillStyle = '#ff4444';
          ctx.font = '18px monospace';
          ctx.fillText(errorMessage, cx, cy + 44);
        }

        // Confirm instruction
        ctx.fillStyle = '#aaaaaa';
        ctx.font = '18px monospace';
        ctx.fillText('Press Enter or tap to confirm', cx, cy + (errorMessage ? 80 : 52));
      },

      drawLeaderboardScreen(canvas, entries, currentScore, currentNickname, isLoading, loadError) {
        const ctx = this.ctx;
        const cx = canvas.width / 2;

        // Dark overlay
        ctx.fillStyle = 'rgba(0,0,0,0.80)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // Title
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 36px monospace';
        ctx.fillText('Leaderboard', cx, 60);

        if (isLoading) {
          ctx.font = '24px monospace';
          ctx.fillText('Loading...', cx, canvas.height / 2);
        } else if (loadError) {
          ctx.font = '24px monospace';
          ctx.fillText('Could not load leaderboard', cx, canvas.height / 2);
        } else {
          // Entry rows — up to 10
          const rowHeight = 32;
          const startY = 110;
          const list = (entries || []).slice(0, 10);
          for (let i = 0; i < list.length; i++) {
            const entry = list[i];
            const rank = i + 1;
            const y = startY + i * rowHeight;
            if (entry.nickname === currentNickname) {
              ctx.fillStyle = '#FFD700';
            } else {
              ctx.fillStyle = '#ffffff';
            }
            ctx.font = '18px monospace';
            ctx.fillText(`#${rank}  ${entry.nickname}  ${entry.score}`, cx, y);
          }
        }

        // Current session score
        const scoreY = canvas.height - 100;
        ctx.fillStyle = '#ffffff';
        ctx.font = '20px monospace';
        ctx.fillText(`Your score: ${currentScore}`, cx, scoreY);

        // Play Again prompt
        ctx.font = '20px monospace';
        ctx.fillText('Play Again', cx, canvas.height - 56);
      },

      render(gameState) {
        const { canvas, ghosty, pipes, clouds, score, highScore, phase, scoreBarHeight } = gameState;
        this.drawBackground(canvas);
        this.drawPipes(pipes, canvas, scoreBarHeight);
        this.drawClouds(clouds);
        this.drawGhosty(ghosty);
        this.drawScoreBar(canvas, score, highScore);
        if (phase === 'idle') this.drawIdleScreen(canvas);
        if (phase === 'leaderboard') this.drawLeaderboardScreen(canvas, gameState.leaderboardEntries, gameState.score, gameState.nickname, gameState.leaderboardLoading, gameState.leaderboardError);
      },
    };

    // Set up ghosty image loading
    Renderer.ghostyImg.onerror = () => { Renderer.ghostyImgFailed = true; };
    Renderer.ghostyImg.src = 'assets/ghosty.png';

    // ─── AABB Collision Detection ────────────────────────────────────────────
    function aabbOverlap(a, b) {
      return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
      );
    }

    // ─── Game Coordinator ────────────────────────────────────────────────────
    const Game = {
      state: null,

      init() {
        const canvas = document.getElementById('gameCanvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        Renderer.ctx = canvas.getContext('2d');

        LeaderboardManager.init();

        const { ghostyWidth, ghostyHeight, scoreBarHeight } = getScaledConstants(canvas);

        this.state = {
          phase: 'idle',
          canvas,
          scoreBarHeight,
          ghosty: {
            x: canvas.width * 0.2,
            y: canvas.height / 2,
            vy: 0,
            width: ghostyWidth,
            height: ghostyHeight,
          },
          pipes: ObstacleManager.pipes,
          clouds: ObstacleManager.clouds,
          score: 0,
          highScore: 0,
          nickname: NicknameManager.getNickname(),
          leaderboardEntries: [],
          leaderboardLoading: false,
          leaderboardError: false,
          nicknameError: null,
        };

        InputHandler.bind(canvas);
        ScoreManager.loadHighScore();
        this.state.highScore = ScoreManager.highScore;

        if (NicknameManager.hasNickname()) {
          this.state.phase = 'idle';
        } else {
          this.state.phase = 'nickname';
          const overlay = document.getElementById('nicknameOverlay');
          if (overlay) overlay.classList.add('active');
          setTimeout(() => {
            const ni = document.getElementById('nicknameInput');
            if (ni) ni.focus();
          }, 100);
        }

        // Wire up nickname confirm (button click + Enter key)
        const confirmNickname = () => {
          const input = document.getElementById('nicknameInput');
          const errorEl = document.getElementById('nicknameError');
          const value = input ? input.value : '';
          const result = NicknameManager.validate(value);
          if (!result.valid) {
            if (errorEl) errorEl.textContent = result.error;
            return;
          }
          NicknameManager.saveNickname(value);
          this.state.nickname = value.trim();
          this.state.nicknameError = null;
          this.state.phase = 'idle';
          const overlay = document.getElementById('nicknameOverlay');
          if (overlay) overlay.classList.remove('active');
        };
        const nicknameInput = document.getElementById('nicknameInput');
        const confirmBtn = document.getElementById('nicknameConfirm');
        if (nicknameInput) nicknameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') confirmNickname(); });
        if (confirmBtn) confirmBtn.addEventListener('click', confirmNickname);

        // Resize handler
        window.addEventListener('resize', () => {
          const oldWidth = canvas.width;
          const oldHeight = canvas.height;

          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;

          const newWidth = canvas.width;
          const newHeight = canvas.height;

          const { ghostyWidth, ghostyHeight, scoreBarHeight: newScoreBarHeight, pipeWidth: newPipeWidth } = getScaledConstants(canvas);
          const scale = canvas.height / 600;
          const newCloudWidth = 80 * scale;
          const newCloudHeight = 30 * scale;

          this.state.scoreBarHeight = newScoreBarHeight;

          // Reposition Ghosty proportionally
          const ghosty = this.state.ghosty;
          ghosty.x = ghosty.x * (newWidth / oldWidth);
          ghosty.y = ghosty.y * (newHeight / oldHeight);
          ghosty.width = ghostyWidth;
          ghosty.height = ghostyHeight;

          // Reposition pipes proportionally
          for (const pipe of this.state.pipes) {
            pipe.x = pipe.x * (newWidth / oldWidth);
            pipe.gapTop = pipe.gapTop * (newHeight / oldHeight);
            pipe.gapBottom = pipe.gapBottom * (newHeight / oldHeight);
            pipe.width = newPipeWidth;
          }

          // Reposition clouds proportionally
          for (const cloud of this.state.clouds) {
            cloud.x = cloud.x * (newWidth / oldWidth);
            cloud.y = cloud.y * (newHeight / oldHeight);
            cloud.width = newCloudWidth;
            cloud.height = newCloudHeight;
          }
        });

        // Start the game loop
        let lastTime = null;
        const loop = (timestamp) => {
          if (lastTime === null) lastTime = timestamp;
          const dt = timestamp - lastTime;
          lastTime = timestamp;

          if (canvas.width !== 0 && canvas.height !== 0) {
            this.update(dt);
            this.render();
          }

          requestAnimationFrame(loop);
        };
        requestAnimationFrame(loop);
      },

      start() {
        this.state.phase = 'playing';
        Analytics.log('game_start');
      },

      restart() {
        ObstacleManager.reset();
        ScoreManager.reset();
        const { canvas, ghosty } = this.state;
        ghosty.x = canvas.width * 0.2;
        ghosty.y = canvas.height / 2;
        ghosty.vy = 0;
        this.state.pipes = ObstacleManager.pipes;
        this.state.clouds = ObstacleManager.clouds;
        this.state.score = 0;
        this.state.phase = 'playing';
      },

      gameOver() {
        const gs = this.state;
        gs.phase = 'leaderboard';
        gs.leaderboardLoading = true;
        gs.leaderboardError = false;
        gs.leaderboardEntries = [];
        AudioManager.playGameOver();
        Analytics.log('game_over', { score: gs.score, nickname: gs.nickname || 'Anonymous' });
        LeaderboardManager.submitAndFetch(gs.nickname || 'Anonymous', gs.score).then((entries) => {
          gs.leaderboardEntries = entries;
          gs.leaderboardLoading = LeaderboardManager.isLoading;
          gs.leaderboardError = LeaderboardManager.loadError;
        });
      },

      update(dt) {
        const gs = this.state;
        const { canvas, ghosty, scoreBarHeight } = gs;

        if (gs.phase === 'nickname') {
          // Handled by HTML overlay — no game loop logic needed
          return;
        }

        if (gs.phase === 'idle') {
          if (InputHandler.consumeFlap()) {
            AudioManager.unlock();
            this.start();
          }
          return;
        }

        if (gs.phase === 'playing') {
          if (InputHandler.consumeFlap()) {
            AudioManager.playJump();
            PhysicsEngine.applyFlap(ghosty);
          }

          PhysicsEngine.applyGravity(ghosty);

          const clamp = PhysicsEngine.clampToBounds(ghosty, canvas.height, scoreBarHeight);
          if (clamp.gameOver) {
            this.gameOver();
            return;
          }

          ObstacleManager.update(gs);
          // Keep state arrays in sync after ObstacleManager mutates them
          gs.pipes = ObstacleManager.pipes;
          gs.clouds = ObstacleManager.clouds;

          ScoreManager.checkPipeCrossing(ghosty, gs.pipes);
          gs.score = ScoreManager.score;
          gs.highScore = ScoreManager.highScore;

          // Collision detection: pipes
          const ghostyRect = {
            x: ghosty.x - ghosty.width / 2,
            y: ghosty.y - ghosty.height / 2,
            width: ghosty.width,
            height: ghosty.height,
          };

          for (const pipe of gs.pipes) {
            const topRect = { x: pipe.x, y: 0, width: pipe.width, height: pipe.gapTop };
            const bottomRect = {
              x: pipe.x,
              y: pipe.gapBottom,
              width: pipe.width,
              height: canvas.height - scoreBarHeight - pipe.gapBottom,
            };
            if (aabbOverlap(ghostyRect, topRect) || aabbOverlap(ghostyRect, bottomRect)) {
              this.gameOver();
              return;
            }
          }

          return;
        }

        if (gs.phase === 'leaderboard') {
          if (InputHandler.consumeFlap()) {
            this.restart();
          }
        }
      },

      render() {
        Renderer.render(this.state);
      },
    };

    // ─── Bootstrap ───────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      Game.init();
    });
  </script>
</body>
</html>
